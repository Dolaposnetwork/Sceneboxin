<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>SceneBOX</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #0b0b1a;
  color: white;
  overflow-x: hidden;
}

/* HEADER */
header {
  text-align: center;
  padding: 30px 10px;
}
header h1 {
  font-size: 40px;
  margin: 0;
}
header span {
  color: #a855f7;
}

/* SEARCH */
.search {
  display: flex;
  justify-content: center;
  margin-bottom: 20px;
}
.search input {
  width: 80%;
  max-width: 400px;
  padding: 12px;
  border-radius: 10px;
  border: none;
  outline: none;
  background: #14142b;
  color: white;
}

/* HERO */
.hero {
  margin: 20px;
  padding: 20px;
  border-radius: 15px;
  background: linear-gradient(135deg, #6d28d9, #2563eb);
  cursor: pointer;
  transition: 0.3s;
}
.hero:hover {
  transform: scale(1.02);
}

/* GRID */
.grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 10px;
  padding: 20px;
}
.card {
  background: #14142b;
  padding: 10px;
  border-radius: 12px;
  cursor: pointer;
  transition: 0.3s;
}
.card:hover {
  transform: scale(1.05);
}
.thumb {
  height: 100px;
  border-radius: 10px;
  background: linear-gradient(135deg, #9333ea, #3b82f6);
  margin-bottom: 8px;
}

/* MODAL */
.modal {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.85);
  display: none;
  align-items: center;
  justify-content: center;
}
.modal-content {
  background: #14142b;
  padding: 15px;
  border-radius: 12px;
  width: 90%;
  max-width: 600px;
}
.close {
  float: right;
  cursor: pointer;
  font-size: 20px;
  margin-bottom: 10px;
}
iframe {
  width: 100%;
  height: 300px;
  border-radius: 10px;
}
</style>
</head>

<body>

<header>
  <h1>Scene<span>BOX</span></h1>
  <p>Nigeria Anime Streaming Platform 2026</p>
</header>

<div class="search">
  <input id="search" placeholder="Search anime..." onkeyup="filterAnime()" />
</div>

<div class="hero" onclick="openModal(featured)">
  <h2>🔥 Featured: Demon Slayer Infinity Arc</h2>
  <p>Click to watch</p>
</div>

<div class="grid" id="grid"></div>

<!-- MODAL -->
<div class="modal" id="modal">
  <div class="modal-content">
    <div class="close" onclick="closeModal()">✖</div>
    <h3 id="title"></h3>
    <iframe id="video" allowfullscreen></iframe>
  </div>
</div>

<script>
const anime = [
  { title: "Attack on Titan", id: "MGRm4IzK1SQ" },
  { title: "Jujutsu Kaisen", id: "n0Jv7d6P7gE" },
  { title: "Naruto", id: "QH5H7s3R3mY" },
  { title: "One Piece", id: "S_E5EHzgZ2k" }
];

const featured = {
  title: "Demon Slayer Infinity Arc",
  id: "VQGCKyvzIM4"
};

const grid = document.getElementById("grid");

function render(list){
  grid.innerHTML = "";
  list.forEach(a => {
    grid.innerHTML += `
      <div class="card" onclick="openModal(${JSON.stringify(a)})">
        <div class="thumb"></div>
        <p>${a.title}</p>
      </div>
    `;
  });
}

function filterAnime(){
  const val = document.getElementById("search").value.toLowerCase();
  render(anime.filter(a => a.title.toLowerCase().includes(val)));
}

function openModal(data){
  document.getElementById("modal").style.display = "flex";
  document.getElementById("title").innerText = data.title;
  document.getElementById("video").src = "https://www.youtube.com/embed/" + data.id;
}

function closeModal(){
  document.getElementById("modal").style.display = "none";
  document.getElementById("video").src = "";
}

render(anime);
</script>

</body>
</html>
