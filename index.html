<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Asap! Dig in Top Animes for 2026 Latest Freely</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">
    <script src="https://kit.fontawesome.com/a076d05399.js" crossorigin="anonymous"></script>
    <style>
        :root {
            --primary: #ff3e3e;
            --bg: #0b0c10;
            --glass: rgba(255, 255, 255, 0.1);
            --text: #ffffff;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }

        body {
            background-color: var(--bg);
            color: var(--text);
            overflow-x: hidden;
        }

        /* Animated Background */
        .bg-glow {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at 50% 50%, #1f2833 0%, #0b0c10 100%);
            z-index: -1;
        }

        /* Navbar */
        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 5%;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(10px);
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .logo { font-size: 24px; font-weight: 800; color: var(--primary); }

        /* Hero Section */
        .hero {
            height: 60vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            background: linear-gradient(to bottom, rgba(0,0,0,0.2), var(--bg)), 
                        url('https://images.alphacoders.com/131/1311654.jpg') center/cover;
            padding: 20px;
        }

        .hero h1 { font-size: 3rem; margin-bottom: 10px; text-transform: uppercase; }
        .hero p { color: #c5c6c7; max-width: 600px; }

        /* Movable/Floating Grid Interface */
        .container {
            padding: 40px 5%;
        }

        .section-title {
            margin-bottom: 30px;
            border-left: 5px solid var(--primary);
            padding-left: 15px;
            font-size: 1.5rem;
        }

        .anime-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 25px;
        }

        /* Anime Card with Hover Animation */
        .anime-card {
            background: var(--glass);
            border-radius: 15px;
            overflow: hidden;
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            cursor: pointer;
            position: relative;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .anime-card:hover {
            transform: translateY(-10px) scale(1.05);
            border-color: var(--primary);
            box-shadow: 0 10px 30px rgba(255, 62, 62, 0.3);
        }

        .anime-card img {
            width: 100%;
            height: 280px;
            object-fit: cover;
        }

        .anime-info {
            padding: 15px;
        }

        .anime-info h3 { font-size: 1rem; margin-bottom: 5px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        
        .badge {
            position: absolute;
            top: 10px;
            right: 10px;
            background: var(--primary);
            padding: 5px 10px;
            border-radius: 5px;
            font-size: 0.7rem;
            font-weight: bold;
        }

        /* Floating Interactive Action Button */
        .fab {
            position: fixed;
            bottom: 30px;
            right: 30px;
            width: 60px;
            height: 60px;
            background: var(--primary);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 5px 15px rgba(0,0,0,0.5);
            cursor: pointer;
            z-index: 999;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(255, 62, 62, 0.7); }
            70% { transform: scale(1.1); box-shadow: 0 0 0 15px rgba(255, 62, 62, 0); }
            100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(255, 62, 62, 0); }
        }

        /* Responsive */
        @media (max-width: 768px) {
            .hero h1 { font-size: 2rem; }
            .anime-grid { grid-template-columns: repeat(2, 1fr); }
        }
    </style>
</head>
<body>

    <div class="bg-glow"></div>

    <nav>
        <div class="logo">ANIME2026</div>
        <div class="search-bar">
            <i class="fas fa-search"></i>
        </div>
    </nav>

    <header class="hero">
        <h1>Asap! Dig in Top Animes for 2026</h1>
        <p>Experience the next generation of streaming with the smoothest interface on the web. Free, Fast, and HD.</p>
    </header>

    <main class="container">
        <h2 class="section-title">Latest Releases (2026)</h2>
        <div class="anime-grid" id="animeGrid">
            <div class="anime-card">
                <span class="badge">EP 24</span>
                <img src="https://via.placeholder.com/200x300/111/fff?text=Solo+Leveling+S2" alt="Anime Title">
                <div class="anime-info">
                    <h3>Solo Leveling: Arise</h3>
                    <small>Action, Fantasy</small>
                </div>
            </div>
            <div class="anime-card">
                <span class="badge">EP 12</span>
                <img src="https://via.placeholder.com/200x300/111/fff?text=Chainsaw+Man+Movie" alt="Anime Title">
                <div class="anime-info">
                    <h3>Chainsaw Man: Reze Arc</h3>
                    <small>Dark Fantasy</small>
                </div>
            </div>
            </div>
    </main>

    <div class="fab">
        <span style="color:white; font-weight:bold;">HOT</span>
    </div>

    <script>
        // Simple Interaction: Smooth Scroll and Card Animations
        document.querySelectorAll('.anime-card').forEach(card => {
            card.addEventListener('click', () => {
                alert("Redirecting to 2026 Player Interface...");
            });
        });

        // Interface "Movement" - subtle mouse tracking for background
        document.addEventListener('mousemove', (e) => {
            const moveX = (e.clientX * -0.01);
            const moveY = (e.clientY * -0.01);
            document.querySelector('.bg-glow').style.transform = `translate(${moveX}px, ${moveY}px)`;
        });
    </script>
</body>
</html>
