<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SceneBOX | Nigeria 2026</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/framer-motion@10.16.4/dist/framer-motion.js"></script>
    
    <style>
        body { margin: 0; background-color: #0a0a0a; color: white; font-family: sans-serif; overflow-x: hidden; }
        .hero-gradient { background: linear-gradient(90deg, #0a0a0a 0%, rgba(10,10,10,0.7) 50%, transparent 100%); }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;
        const { motion, AnimatePresence } = FramerMotion;

        function App() {
            const [selected, setSelected] = useState(null);
            
            const anime = [
                { id: 1, t: "Solo Leveling", g: "Action", v: "q_mSSTfD3u0", i: "https://images.unsplash.com/photo-1578632738981-43c9efaa357f?w=400" },
                { id: 2, t: "Jujutsu Kaisen", g: "Power", v: "h9nE2hZ8T8M", i: "https://images.unsplash.com/photo-1618336753974-aae8e04506aa?w=400" },
                { id: 3, t: "Chainsaw Man", g: "Grit", v: "v4yLeN6u9C8", i: "https://images.unsplash.com/photo-1607604276583-eef5d076aa5f?w=400" },
                { id: 4, t: "Demon Slayer", g: "Sword", v: "VQGCKyvzIM4", i: "https://images.unsplash.com/photo-1528319725582-ddc096101511?w=400" }
            ];

            return (
                <div className="min-h-screen pb-20">
                    {/* Header */}
                    <nav className="p-6 flex justify-between items-center fixed w-full z-50 bg-black/50 backdrop-blur-md">
                        <h1 className="text-2xl font-black text-indigo-500 tracking-tighter">SceneBOX</h1>
                        <div className="hidden md:block space-x-6 text-sm font-bold uppercase tracking-widest">
                            <a href="#" className="text-white">Home</a>
                            <a href="#" className="text-gray-400 hover:text-white">Anime</a>
                            <a href="#" className="text-gray-400 hover:text-white">New</a>
                        </div>
                    </nav>

                    {/* Hero */}
                    <div className="relative h-[70vh] flex items-center px-6 md:px-20 overflow-hidden">
                        <div className="absolute inset-0 z-0">
                            <div className="absolute inset-0 hero-gradient z-10" />
                            <img src="https://images.unsplash.com/photo-1541562232579-512a21360020?w=1600" className="w-full h-full object-cover" />
                        </div>
                        <div className="relative z-20 mt-20">
                            <h2 className="text-5xl md:text-8xl font-black mb-4">NEO LAGOS</h2>
                            <p className="max-w-md text-gray-300 mb-8">Launching 2026. The future of Nigerian Anime streaming starts here.</p>
                            <button className="bg-indigo-600 hover:bg-indigo-700 px-10 py-4 rounded-full font-bold transition-all transform hover:scale-105">WATCH TRAILER</button>
                        </div>
                    </div>

                    {/* Grid */}
                    <div className="px-6 md:px-20 mt-10">
                        <h3 className="text-xl font-bold mb-6 text-indigo-400">Trending in Nigeria</h3>
                        <div className="grid grid-cols-2 md:grid-cols-4 gap-6">
                            {anime.map(item => (
                                <motion.div 
                                    key={item.id}
                                    whileHover={{ y: -10 }}
                                    onClick={() => setSelected(item)}
                                    className="cursor-pointer"
                                >
                                    <div className="aspect-[2/3] rounded-xl overflow-hidden border border-white/10 hover:border-indigo-500 transition-colors">
                                        <img src={item.i} className="w-full h-full object-cover" />
                                    </div>
                                    <h4 className="mt-3 font-bold text-sm uppercase">{item.t}</h4>
                                    <p className="text-xs text-gray-500">{item.g}</p>
                                </motion.div>
                            ))}
                        </div>
                    </div>

                    {/* Modal */}
                    <AnimatePresence>
                        {selected && (
                            <motion.div 
                                initial={{ opacity: 0 }} animate={{ opacity: 1 }} exit={{ opacity: 0 }}
                                className="fixed inset-0 z-[100] flex items-center justify-center bg-black/90 p-4"
                                onClick={() => setSelected(null)}
                            >
                                <motion.div 
                                    initial={{ scale: 0.8 }} animate={{ scale: 1 }}
                                    className="w-full max-w-4xl aspect-video bg-black rounded-2xl overflow-hidden relative"
                                    onClick={e => e.stopPropagation()}
                                >
                                    <iframe 
                                        className="w-full h-full"
                                        src={`https://www.youtube.com/embed/${selected.v}?autoplay=1`}
                                        frameBorder="0" allowFullScreen
                                    />
                                    <button className="absolute top-4 right-4 text-white font-bold" onClick={() => setSelected(null)}>CLOSE [X]</button>
                                </motion.div>
                            </motion.div>
                        )}
                    </AnimatePresence>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
