<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Asap! Dig in Top Animes for 2026 Latest Freely</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --primary: #ff3e3e; 
            --bg: #0b0c10;
            --glass: rgba(255, 255, 255, 0.05);
            --text: #ffffff;
            --accent: #66fcf1;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }

        body {
            background-color: var(--bg);
            color: var(--text);
            overflow-x: hidden;
            perspective: 1000px;
        }

        .bg-glow {
            position: fixed;
            top: -50%; left: -50%; width: 200%; height: 200%;
            background: radial-gradient(circle at 50% 50%, #1f2833 0%, #0b0c10 80%);
            z-index: -2;
            transition: transform 0.1s ease-out;
        }

        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 5%;
            background: rgba(11, 12, 16, 0.9);
            backdrop-filter: blur(15px);
            position: sticky;
            top: 0;
            z-index: 1000;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        .logo-container { display: flex; align-items: center; gap: 10px; cursor: pointer; }

        .logo-img {
            width: 35px;
            height: 35px;
            animation: logoBounce 1.5s cubic-bezier(0.68, -0.55, 0.27, 1.55) forwards;
            opacity: 0;
        }

        .logo-text { font-size: 22px; font-weight: 800; color: var(--text); letter-spacing: -1px; }
        .logo-text span { color: var(--primary); }

        @keyframes logoBounce {
            0% { transform: translateY(-50px) scale(0); opacity: 0; }
            60% { transform: translateY(10px) scale(1.1); opacity: 1; }
            80% { transform: translateY(-5px) scale(0.95); }
            100% { transform: translateY(0) scale(1); opacity: 1; }
        }

        .search-bar { position: relative; width: 250px; }
        .search-bar input {
            width: 100%;
            padding: 10px 15px 10px 40px;
            background: rgba(255,255,255,0.1);
            border: 1px solid transparent;
            border-radius: 20px;
            color: #fff;
            transition: all 0.3s;
        }
        .search-bar input:focus {
            background: rgba(255,255,255,0.2);
            border-color: var(--primary);
            box-shadow: 0 0 15px rgba(255, 62, 62, 0.4);
            outline: none;
            width: 300px;
        }
        .search-bar i { position: absolute; left: 15px; top: 50%; transform: translateY(-50%); color: rgba(255,255,255,0.5); }

        .hero {
            height: 50vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            background: linear-gradient(to bottom, rgba(11, 12, 16, 0.3), var(--bg)), 
                        url('https://images.alphacoders.com/131/1311654.jpg') center/cover;
            padding: 20px;
            margin-bottom: 20px;
        }

        .hero h1 { 
            font-size: 3.5rem; 
            text-transform: uppercase; 
            background: linear-gradient(to right, #fff 20%, var(--primary) 40%, var(--primary) 60%, #fff 80%);
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: textShine 4s linear infinite;
        }

        @keyframes textShine { to { background-position: 200% center; } }

        .container { padding: 20px 5% 100px 5%; }
        .section-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .section-title { border-left: 5px solid var(--primary); padding-left: 15px; font-size: 1.8rem; text-transform: uppercase; }

        .anime-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 30px;
            animation: gridFadeIn 1s ease-out;
        }

        @keyframes gridFadeIn { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; } }

        .anime-card {
            background: var(--glass);
            border-radius: 16px;
            overflow: hidden;
            transition: transform 0.1s ease-out, box-shadow 0.3s ease;
            cursor: pointer;
            position: relative;
            transform-style: preserve-3d;
        }

        .img-container { width: 100%; height: 320px; position: relative; overflow: hidden; }
        .anime-card img { width: 100%; height: 100%; object-fit: cover; }

        .card-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5);
            display: flex; justify-content: center; align-items: center;
            opacity: 0; transition: opacity 0.3s; z-index: 2;
        }
        .anime-card:hover .card-overlay { opacity: 1; }
        .play-icon-giant { font-size: 3rem; color: var(--primary); filter: drop-shadow(0 0 10px var(--primary)); }

        .badge { position: absolute; top: 15px; right: 15px; background: var(--primary); padding: 4px 12px; border-radius: 20px; font-size: 0.7rem; font-weight: 700; z-index: 4; animation: badgePulse 1.5s infinite; }
        @keyframes badgePulse { 0% { box-shadow: 0 0 0 0 rgba(255, 62, 62, 0.7); } 70% { box-shadow: 0 0 0 8px rgba(255, 62, 62, 0); } }

        .anime-info { padding: 18px; }

        /* 📺 Video Modal Styling */
        #videoModal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95); z-index: 10000; justify-content: center; align-items: center;
            backdrop-filter: blur(10px);
        }
        .modal-content {
            position: relative; width: 90%; max-width: 1000px; aspect-ratio: 16/9;
            background: #000; border: 2px solid var(--primary); border-radius: 15px; overflow: hidden;
        }
        .close-btn {
            position: absolute; top: 15px; right: 15px; background: var(--primary);
            color: white; border: none; border-radius: 50%; width: 40px; height: 40px;
            cursor: pointer; font-weight: bold; z-index: 101;
        }

        #funnyNotify {
            position: fixed; bottom: -100px; right: 30px; background: #1f2833;
            color: #fff; padding: 15px 25px; border-radius: 10px; border-left: 5px solid var(--accent);
            transition: bottom 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); display: flex; gap: 15px; z-index: 2000;
        }
        #funnyNotify.show { bottom: 30px; }

        .fab { position: fixed; bottom: 30px; left: 30px; width: 60px; height: 60px; background: var(--primary); border-radius: 50%; display: flex; justify-content: center; align-items: center; z-index: 999; cursor: pointer; }
    </style>
</head>
<body>

    <div class="bg-glow" id="bgGlow"></div>

    <nav>
        <div class="logo-container" onclick="location.reload()">
            <img src="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAOEAAADhCAMAAAAJbSJIAAAAflBMVEX///8AAAD8/Pz4+Pj6+vr39/fy8vLv7+/j4+Pn5+fh4eHb29vX19fNzc3Dw8PIyMiurq6hoKGZmZmWlpZ8fHxycnJra2tsbGxQUFBPT09HR0dCQkJERER8fXxsbGxjY2NCQkJAQEBBQUFFRUVKSkpRUVFTU1NcXFxtbW14eHghWfP8AAAESklEQVR4nO3b2XLbMAxAYYm6L5YkWZatxE5S///L48RxbCeWSIBg0fO9AwwH4i4WIAESZAAAAAAAAAAAAAAAAAAAAAAAAMALFmU9T5vF8v3XN7x/XbUf28O0mYv15+b574/59/U45P12/3i7Wz5vF7vXfH+4H7/56/zN3fM3d978z4+3+1V/X/X5+9vHbeS7p/xT/fW5vH59un5mPvfPv33X9N3p++39+X77vOf/4p/19vYm1wXbM7H5mP80f/+06bvz+X+7tYVv+/p8W+X+W75/wX7P9fXl/893Xy+Y7Xdf6/65+94vK+/45rP/+fLp3bM+z7/fP5eXd8yY/xR8X4Ff/5/536nK/f5XjH+C8Vcw/grGX8H4Kxh/BeOvYPwVjL+C8Vcw/grGX8H4Kxh/BeOvYPwVjL+C8Vcw/grGX8H4Kxh/BeOvYPwVjL+C8Vcw/grGX8H4Kxh/BeOvYPwVjL+C8Vcw/grGX8H4Kxh/BeOvYPwVjL+C8Vcw/grGX8H4Kxh/BeOvYPwVjL+C8Vcw/grGX8H4Kxh/BeOvYPwVjL+C8Vcw/grGX8H4Kxh/BeOvYPwVjL+C8Vcw/grGX8H4Kxh/BeOvYPwVjL+C8Vcw/grGX8H4Kxh/BeOvYPwVjL+C8Vcw/grGX8H4Kxh/BeOvYPwVjL+C8Vcw/grGX8H4Kxh/BeOvYPwVjL+C8Vcw/grGX8H4Kxh/BeOvYPwVjL+C8Vcw/grGX8H4Kxh/BeOvYPwVjL+C8Vcw/grGX8H4Kxh/BeOvYPwVjL+C8Vcw/grGX8H4Kxh/BeOvYPwVjL+C8Vcw/grGX8H4Kxh/BeOvYPwVjL+C8Vcw/grGX8H4Kxh/BeOvYPwVjL+C8Vcw/grGX8H4Kxh/BeOvYPwVjL+C8Vcw/grGX8H4Kxh/BeOvYPwVjL+C8Vcw/grGX8H4Kxh/BeOvYPwVjL+C8Vcw/grGX8H4Kxh/BeOvYPwVjL+C8Vcw/grGX8H4Kxh/BeOvYPwVjL+C8Vcw/grGX8H4Kxh/BeOvYPwVjL+C8Vcw/grGX8H4Kxh/BeOvYPwVjL+C8Vcw/grGX8H4Kxh/BeOvYPwVjL+C8Vcw/grGX8H4Kxh/BeOvYPwVjL+C8Vcw/grGX8H4Kxh/BeOvYPwVjL+C8Vcw/grGX8H4Kxh/BeOvYPwVjL+C8Vcw/grGX8H4Kxh/BeOvYPwVjL+C8Vcw/grGX8H4Kxh/BeOvYPwVjL+C8Vcw/grGX8H4Kxh/BeOvYPwVjL+C8Vcw/grGX8H4Kxh/BeOvYPwVjL+C8Vcw/grGX8H4Kxh/BeOvYPwVjL+C8Vcw/grGX8H4Kxh/BeOvYPwVjL+C8Vcw/grGX8H4Kxh/BeOvYPwVjL+C8Vcw/grGX8H4Kxh/BeOvYPwVjL+C8Vcw/grGX8H4Kxh/BeOvbvU45P12/3i7Wz5vF7vXfH+4H7/56/zN3fM3d97858fb/aq/r/r8/e3jNvLdU/6pAAAAAADAPxX4D3OAL4M64S+mAAAAAElFTVSuQmCC" alt="Logo" class="logo-img">
            <div class="logo-text">ANIME<span>2026</span></div>
        </div>
        <div class="search-bar">
            <input type="text" placeholder="Search freely...">
            <i class="fas fa-search"></i>
        </div>
    </nav>

    <header class="hero">
        <h1>Asap! Dig in Top Animes</h1>
        <p>Welcome to Scenebox, the fastest streaming interface. No lag, no limits.</p>
    </header>

    <main class="container">
        <div class="section-header">
            <h2 class="section-title">Latest Releases (2026)</h2>
        </div>
        <div class="anime-grid" id="animeGrid"></div>
    </main>

    <div id="videoModal">
        <div class="modal-content">
            <button class="close-btn" onclick="closeVideo()">X</button>
            <iframe id="videoFrame" width="100%" height="100%" src="" frameborder="0" allow="autoplay; encrypted-media" allowfullscreen></iframe>
        </div>
    </div>

    <div id="funnyNotify">
        <i class="fas fa-skull" style="color:var(--accent); font-size:1.5rem;"></i>
        <div>
            <strong style="color:var(--accent);">Streaming Mode Engaged!</strong><br>
            <small>Buffering the epicness...</small>
        </div>
    </div>

    <div class="fab"><i class="fas fa-fire" style="color:white; font-size:1.5rem;"></i></div>

    <script>
        const animeData = [
            { title: "Solo Leveling: Arise S2", ep: "24", genre: "Action", link: "https://www.youtube.com/embed/dQw4w9WgXcQ" },
            { title: "Chainsaw Man: Reze Arc", ep: "Movie", genre: "Dark Fantasy", link: "https://www.youtube.com/embed/v4yLeN65S_8" },
            { title: "Jujutsu Kaisen: Culling Game", ep: "18", genre: "Action", link: "https://www.youtube.com/embed/O6qV3BiBaC0" },
            { title: "Cyberpunk: Edgerunners 2", ep: "10", genre: "Sci-Fi", link: "https://www.youtube.com/embed/PqsREu6it8M" },
            { title: "Demon Slayer: Infinity Castle", ep: "22", genre: "Action", link: "https://www.youtube.com/embed/VQGCKyvzIM4" },
            { title: "Spy x Family Season 3", ep: "25", genre: "Comedy", link: "https://www.youtube.com/embed/S8_YwSjs8U4" },
            { title: "One Piece: Elbaf Arc", ep: "1150+", genre: "Adventure", link: "https://www.youtube.com/embed/S8_YwSjs8U4" },
            { title: "Oshi No Ko Season 2", ep: "13", genre: "Drama", link: "https://www.youtube.com/embed/O6qV3BiBaC0" }
        ];

        const grid = document.getElementById('animeGrid');
        const notify = document.getElementById('funnyNotify');
        const modal = document.getElementById('videoModal');
        const frame = document.getElementById('videoFrame');

        animeData.forEach(anime => {
            const card = document.createElement('div');
            card.className = 'card-perspective';
            card.innerHTML = `
                <div class="anime-card">
                    <span class="badge">EP ${anime.ep}</span>
                    <div class="img-container">
                        <div class="card-overlay"><i class="fas fa-play-circle play-icon-giant"></i></div>
                        <img src="https://via.placeholder.com/220x320/1a1d24/fff?text=${anime.title.replace(/ /g, '+')}" alt="${anime.title}">
                    </div>
                    <div class="anime-info">
                        <h3>${anime.title}</h3>
                        <small>${anime.genre}</small>
                    </div>
                </div>
            `;
            
            card.querySelector('.anime-card').addEventListener('click', () => {
                notify.classList.add('show');
                frame.src = anime.link + "?autoplay=1";
                modal.style.display = 'flex';
                setTimeout(() => notify.classList.remove('show'), 3000);
            });

            grid.appendChild(card);
        });

        function closeVideo() {
            modal.style.display = 'none';
            frame.src = ""; 
        }

        // 3D Tilt Logic
        document.addEventListener('mousemove', (e) => {
            const moveX = (e.clientX * -0.005); 
            const moveY = (e.clientY * -0.005);
            document.getElementById('bgGlow').style.transform = `translate(${moveX}px, ${moveY}px)`;
        });

        grid.addEventListener('mouseover', (e) => {
            const card = e.target.closest('.anime-card');
            if (!card) return;
            card.addEventListener('mousemove', (me) => {
                const rect = card.getBoundingClientRect();
                const x = me.clientX - rect.left;
                const y = me.clientY - rect.top;
                card.style.transform = `rotateX(${(y - rect.height/2)/10}deg) rotateY(${(rect.width/2 - x)/10}deg) scale(1.03)`;
            });
            card.addEventListener('mouseleave', () => card.style.transform = '');
        });
    </script>
</body>
