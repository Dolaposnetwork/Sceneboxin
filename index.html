<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SceneBOX - Nigeria's Anime Streaming Platform</title>
    
    <style>
        /* CSS STYLES */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #121212;
            color: #ffffff;
        }

        header {
            text-align: center;
            padding: 40px 20px;
            background: linear-gradient(180deg, #1f1f1f 0%, #121212 100%);
        }

        #search {
            padding: 12px;
            width: 80%;
            max-width: 400px;
            border-radius: 25px;
            border: none;
            margin-top: 20px;
            outline: none;
        }

        .hero img {
            width: 100%;
            height: 400px;
            object-fit: cover;
            display: block;
        }

        .film-grid {
            padding: 40px 20px;
        }

        .grid-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 20px;
        }

        .grid-item {
            cursor: pointer;
            transition: transform 0.3s ease;
            background: #1e1e1e;
            border-radius: 8px;
            padding: 10px;
            text-align: center;
        }

        .grid-item:hover {
            transform: scale(1.05);
            background: #2a2a2a;
        }

        .grid-item img {
            width: 100%;
            border-radius: 5px;
            aspect-ratio: 16/9;
            object-fit: cover;
        }

        /* MODAL STYLES */
        .modal {
            display: none;
            position: fixed;
            z-index: 100;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.9);
        }

        .close {
            color: #ffffff;
            position: absolute;
            top: 20px;
            right: 35px;
            font-size: 40px;
            font-weight: bold;
            cursor: pointer;
        }

        .modal-content {
            position: relative;
            margin: auto;
            top: 50%;
            transform: translateY(-50%);
            width: 80%;
            max-width: 800px;
        }

        .video-container {
            position: relative;
            padding-bottom: 56.25%; /* 16:9 Aspect Ratio */
            height: 0;
        }

        .video-container iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }

        footer {
            text-align: center;
            padding: 40px;
            background: #000;
            font-size: 0.9rem;
            color: #777;
        }
    </style>
</head>
<body>

    <header>
        <h1>SceneBOX</h1>
        <p>Your ultimate destination for anime streaming in Nigeria.</p>
        <input type="text" id="search" placeholder="Search for your favorite anime...">
    </header>

    <main>
        <section class="hero">
            <img src="https://images.unsplash.com/photo-1578632738980-43314a5b452d?auto=format&fit=crop&w=1200&q=80" alt="SceneBOX Hero Image">
        </section>

        <section class="film-grid">
            <h2>Featured Anime</h2>
            <div class="grid-container">
                <div class="grid-item" onclick="openModal('dQw4w9WgXcQ')">
                    <img src="https://placehold.co/600x400/222/white?text=Anime+Title+1" alt="Anime Title 1">
                    <p>Anime Title 1</p>
                </div>
                <div class="grid-item" onclick="openModal('dQw4w9WgXcQ')">
                    <img src="https://placehold.co/600x400/222/white?text=Anime+Title+2" alt="Anime Title 2">
                    <p>Anime Title 2</p>
                </div>
                <div class="grid-item" onclick="openModal('dQw4w9WgXcQ')">
                    <img src="https://placehold.co/600x400/222/white?text=Anime+Title+3" alt="Anime Title 3">
                    <p>Anime Title 3</p>
                </div>
            </div>
        </section>
    </main>

    <div id="watchModal" class="modal">
        <span class="close" onclick="closeModal()">&times;</span>
        <div class="modal-content">
            <div class="video-container">
                <iframe id="videoFrame" src="" frameborder="0" allow="autoplay; encrypted-media" allowfullscreen></iframe>
            </div>
        </div>
    </div>

    <footer>
        <p>&copy; 2026 SceneBOX Nigeria. All rights reserved.</p>
    </footer>

    <script>
        // JAVASCRIPT LOGIC
        function openModal(videoId) {
            const modal = document.getElementById("watchModal");
            const videoFrame = document.getElementById("videoFrame");
            // Appending autoplay to make it smoother
            videoFrame.src = `https://www.youtube.com/embed/${videoId}?autoplay=1`;
            modal.style.display = "block";
            // Prevent background scrolling when modal is open
            document.body.style.overflow = "hidden";
        }

        function closeModal() {
            const modal = document.getElementById("watchModal");
            const videoFrame = document.getElementById("videoFrame");
            videoFrame.src = "";
            modal.style.display = "none";
            // Re-enable scrolling
            document.body.style.overflow = "auto";
        }

        // Close modal if user clicks outside the video
        window.onclick = function(event) {
            const modal = document.getElementById("watchModal");
            if (event.target == modal) {
                closeModal();
            }
        }
    </script>
</body>
</html>
