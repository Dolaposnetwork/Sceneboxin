<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SceneBOX | Nigeria's Premier Anime Platform</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/framer-motion@10.16.4/dist/framer-motion.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #0a0a0a; color: white; overflow-x: hidden; }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #0a0a0a; }
        ::-webkit-scrollbar-thumb { background: #6366f1; border-radius: 10px; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;
        const { motion, AnimatePresence } = FramerMotion;

        const SceneBOX = () => {
            const [isScrolled, setIsScrolled] = useState(false);
            const [selectedAnime, setSelectedAnime] = useState(null);
            const [search, setSearch] = useState("");

            const animeList = [
                { id: 1, title: "SOLO LEVELING", tags: ["Action", "Fantasy"], vid: "q_mSSTfD3u0", img: "https://images.unsplash.com/photo-1578632738981-43c9efaa357f?q=80&w=800" },
                { id: 2, title: "JUJUTSU KAISEN", tags: ["Supernatural"], vid: "h9nE2hZ8T8M", img: "https://images.unsplash.com/photo-1618336753974-aae8e04506aa?q=80&w=800" },
                { id: 3, title: "CHAINSAW MAN", tags: ["Dark Fantasy"], vid: "v4yLeN6u9C8", img: "https://images.unsplash.com/photo-1607604276583-eef5d076aa5f?q=80&w=800" },
                { id: 4, title: "DEMON SLAYER", tags: ["Adventure"], vid: "VQGCKyvzIM4", img: "https://images.unsplash.com/photo-1528319725582-ddc096101511?q=80&w=800" },
                { id: 5, title: "NARUTO SHIPPUDEN", tags: ["Classic"], vid: "-G9BqkgZXRA", img: "https://images.unsplash.com/photo-1541562232579-512a21360020?q=80&w=800" }
            ];

            useEffect(() => {
                const handleScroll = () => setIsScrolled(window.scrollY > 50);
                window.addEventListener('scroll', handleScroll);
                return () => window.removeEventListener('scroll', handleScroll);
            }, []);

            return (
                <div className="min-h-screen">
                    {/* NAV */}
                    <nav className={`fixed w-full z-50 transition-all duration-500 px-6 py-4 flex items-center justify-between ${isScrolled ? 'bg-black/90 backdrop-blur-md shadow-2xl' : 'bg-transparent'}`}>
                        <div className="flex items-center gap-8">
                            <h1 className="text-3xl font-black tracking-tighter text-indigo-500">Scene<span className="text-white">BOX</span></h1>
                        </div>
                        <div className="flex items-center gap-4 bg-white/5 border border-white/10 rounded-full px-4 py-2">
                            <input 
                                type="text" 
                                placeholder="Search..." 
                                className="bg-transparent border-none outline-none text-sm w-24 md:w-64"
                                onChange={(e) => setSearch(e.target.value)}
                            />
                        </div>
                    </nav>

                    {/* HERO */}
                    <section className="relative h-[85vh] flex items-center px-6 md:px-20">
                        <div className="absolute inset-0 z-0">
                            <div className="absolute inset-0 bg-gradient-to-r from-[#0a0a0a] via-transparent to-transparent z-10" />
                            <div className="absolute inset-0 bg-gradient-to-t from-[#0a0a0a] to-transparent z-10" />
                            <img src="https://images.unsplash.com/photo-1541562232579-512a21360020?q=80&w=2000" className="w-full h-full object-cover opacity-60" />
                        </div>
                        <motion.div initial={{ opacity: 0, x: -30 }} animate={{ opacity: 1, x: 0 }} className="relative z-20">
                            <span className="bg-indigo-600 px-3 py-1 rounded-full text-xs font-bold mb-4 inline-block tracking-widest">NIGERIA'S #1</span>
                            <h2 className="text-6xl md:text-8xl font-black mb-4 leading-tight">NEO<br/>LAGOS</h2>
                            <div className="flex gap-4">
                                <button className="bg-white text-black px-8 py-3 rounded-lg font-bold hover:bg-indigo-500 hover:text-white transition-all">Play Now</button>
                            </div>
                        </motion.div>
                    </section>

                    {/* GRID */}
                    <main className="px-6 md:px-20 -mt-20 relative z-30 pb-20">
                        <h3 className="text-2xl font-bold mb-8">Trending Now</h3>
                        <div className="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-5 gap-6">
                            {animeList.filter(a => a.title.toLowerCase().includes(search.toLowerCase())).map((anime) => (
                                <motion.div 
                                    key={anime.id}
                                    whileHover={{ y: -10, scale: 1.02 }}
                                    onClick={() => setSelectedAnime(anime)}
                                    className="cursor-pointer group"
                                >
                                    <div className="relative aspect-[2/3] rounded-2xl overflow-hidden mb-3 border border-white/10 group-hover:border-indigo-500 transition-all">
                                        <img src={anime.img} className="w-full h-full object-cover transition-transform duration-700 group-hover:scale-110" />
                                        <div className="absolute inset-0 bg-black/40 opacity-0 group-hover:opacity-100 transition-opacity flex items-center justify-center">
                                            <div className="w-12 h-12 bg-indigo-500 rounded-full flex items-center justify-center shadow-xl">
                                                <svg width="24" height="24" viewBox="0 0 24 24" fill="white"><path d="M8 5v14l11-7z"/></svg>
                                            </div>
                                        </div>
                                    </div>
                                    <h4 className="font-bold text-sm truncate uppercase tracking-wider">{anime.title}</h4>
                                    <p className="text-[10px] text-gray-500 uppercase">{anime.tags.join(" • ")}</p>
                                </motion.div>
                            ))}
                        </div>
                    </main>

                    {/* MODAL */}
                    <AnimatePresence>
                        {selectedAnime && (
                            <motion.div 
                                initial={{ opacity: 0 }} animate={{ opacity: 1 }} exit={{ opacity: 0 }}
                                className="fixed inset-0 z-[100] flex items-center justify-center bg-black/95 p-4"
                            >
                                <div className="absolute inset-0" onClick={() => setSelectedAnime(null)} />
                                <motion.div 
                                    initial={{ scale: 0.9, y: 50 }} animate={{ scale: 1, y: 0 }}
                                    className="relative w-full max-w-4xl aspect-video bg-black rounded-3xl overflow-hidden shadow-2xl border border-white/10"
                                >
                                    <iframe 
                                        className="w-full h-full"
                                        src={`https://www.youtube.com/embed/${selectedAnime.vid}?autoplay=1`}
                                        frameBorder="0" allowFullScreen
                                    />
                                    <button 
                                        onClick={() => setSelectedAnime(null)}
                                        className="absolute top-4 right-4 text-white hover:text-indigo-400 transition-colors"
                                    >
                                        <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M18 6L6 18M6 6l12 12"/></svg>
                                    </button>
                                </motion.div>
                            </motion.div>
                        )}
                    </AnimatePresence>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<SceneBOX />);
    </script>
</body>
</html>
