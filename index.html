<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Asap! Dig in Top Animes for 2026 Latest Freely</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --primary: #ff3e3e; 
            --bg: #0b0c10;
            --glass: rgba(255, 255, 255, 0.05);
            --text: #ffffff;
            --accent: #66fcf1; 
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }

        body {
            background-color: var(--bg);
            color: var(--text);
            overflow-x: hidden;
            perspective: 1000px;
        }

        /* 🌌 Animated Parallax Background */
        .bg-glow {
            position: fixed;
            top: -50%; left: -50%; width: 200%; height: 200%;
            background: radial-gradient(circle at 50% 50%, #1f2833 0%, #0b0c10 80%);
            z-index: -2;
            transition: transform 0.1s ease-out;
        }

        /* 🛸 Navbar */
        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 5%;
            background: rgba(11, 12, 16, 0.9);
            backdrop-filter: blur(15px);
            position: sticky;
            top: 0;
            z-index: 1000;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        /* 🎈 Updated Animative Logo Section */
        .logo-container {
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
        }

        .logo-img {
            width: 45px; /* Perfect size for the leaf logo */
            height: auto;
            opacity: 0;
            filter: drop-shadow(0 0 8px var(--primary));
            /* Logo Funny Rebound & Spin on Load */
            animation: logoBounce 1.5s cubic-bezier(0.68, -0.55, 0.27, 1.55) forwards;
            transition: transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        /* Hover Animation: Spin and Grow */
        .logo-container:hover .logo-img {
            transform: rotate(360deg) scale(1.2);
        }

        .logo-text {
            font-size: 24px;
            font-weight: 800;
            color: var(--text);
            letter-spacing: -1px;
            text-transform: uppercase;
        }

        .logo-text span { color: var(--primary); }

        @keyframes logoBounce {
            0% { transform: translateY(-50px) rotate(-45deg) scale(0); opacity: 0; }
            60% { transform: translateY(10px) rotate(10deg) scale(1.1); opacity: 1; }
            100% { transform: translateY(0) rotate(0) scale(1); opacity: 1; }
        }

        /* 🔍 Search Bar */
        .search-bar {
            position: relative;
            width: 250px;
        }

        .search-bar input {
            width: 100%;
            padding: 10px 15px 10px 40px;
            background: rgba(255,255,255,0.1);
            border: 1px solid transparent;
            border-radius: 20px;
            color: #fff;
            transition: all 0.3s;
        }

        .search-bar input:focus {
            background: rgba(255,255,255,0.2);
            border-color: var(--primary);
            box-shadow: 0 0 15px rgba(255, 62, 62, 0.4);
            outline: none;
            width: 300px;
        }

        .search-bar i {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: rgba(255,255,255,0.5);
        }

        /* 🎬 Hero Section */
        .hero {
            height: 45vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            background: linear-gradient(to bottom, rgba(11, 12, 16, 0.4), var(--bg)), 
                        url('https://images.alphacoders.com/131/1311654.jpg') center/cover;
            padding: 20px;
        }

        .hero h1 { 
            font-size: 3.5rem; 
            background: linear-gradient(to right, #fff 20%, var(--primary) 40%, var(--primary) 60%, #fff 80%);
            background-size: 200% auto;
            color: #fff;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: textShine 4s linear infinite;
        }

        @keyframes textShine { to { background-position: 200% center; } }

        /* 🎛️ Grid & Cards */
        .container { padding: 40px 5% 100px 5%; }
        .section-title { border-left: 5px solid var(--primary); padding-left: 15px; font-size: 1.8rem; text-transform: uppercase; font-weight: 800; margin-bottom: 30px;}

        .anime-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 30px;
        }

        .anime-card {
            background: var(--glass);
            border-radius: 16px;
            overflow: hidden;
            transition: transform 0.1s ease-out, box-shadow 0.3s ease;
            cursor: pointer;
            position: relative;
            border: 1px solid rgba(255,255,255,0.03);
            transform-style: preserve-3d;
        }

        .img-container { width: 100%; height: 320px; overflow: hidden; position: relative; }
        .anime-card img { width: 100%; height: 100%; object-fit: cover; transition: 0.5s; }
        .anime-card:hover img { transform: scale(1.1); }

        .anime-info { padding: 18px; }
        .badge { position: absolute; top: 15px; right: 15px; background: var(--primary); padding: 4px 12px; border-radius: 20px; font-size: 0.7rem; font-weight: 700; z-index: 10; animation: badgePulse 1.5s infinite; }

        @keyframes badgePulse {
            0% { box-shadow: 0 0 0 0 rgba(255, 62, 62, 0.7); }
            70% { box-shadow: 0 0 0 8px rgba(255, 62, 62, 0); }
        }

        #funnyNotify {
            position: fixed;
            bottom: -100px;
            right: 30px;
            background: #1f2833;
            padding: 15px 25px;
            border-radius: 10px;
            border-left: 5px solid var(--accent);
            z-index: 2000;
            transition: 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex;
            align-items: center;
            gap: 15px;
        }

        #funnyNotify.show { bottom: 30px; }

        .fab {
            position: fixed;
            bottom: 30px;
            left: 30px;
            width: 60px;
            height: 60px;
            background: var(--primary);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            z-index: 999;
            transition: 0.3s;
        }

        .fab:hover { transform: scale(1.1) rotate(15deg); }

        @media (max-width: 600px) {
            .logo-text { display: none; }
            .anime-grid { grid-template-columns: repeat(2, 1fr); gap: 15px; }
        }
    </style>
</head>
<body>

        </div>
        <div class="search-bar">
            <input type="text" placeholder="Search freely...">
            <i class="fas fa-search"></i>
        </div>
    </nav>

    <header class="hero">
        <h1>Asap! Dig in Top Animes</h1>
        <p>Scenebox: No lag, no limits, just pure energy.</p>
    </header>

    <main class="container">

        <div class="anime-grid" id="animeGrid"></div>
    </main>

    <div id="funnyNotify">
        <i class="fas fa-bolt" style="color:var(--accent); font-size:1.5rem;"></i>
        <div>
            <strong style="color:var(--accent);">Over 9000!</strong><br>
            <small>Loading the player interface...</small>
        </div>
    </div>

    <div class="fab">
        <i class="fas fa-fire" style="color:white; font-size:1.5rem;"></i>
    </div>
